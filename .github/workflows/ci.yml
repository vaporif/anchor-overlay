name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    name: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Check formatting
        run: nix flake check

  check:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        anchor-version: ["0.32.1", "1.0.0"]
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
          - runner: macos-latest
            system: aarch64-darwin

    runs-on: ${{ matrix.runner }}
    name: check (${{ matrix.system }}, ${{ matrix.anchor-version }})

    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build anchor-cli
        run: nix build '.#legacyPackages.${{ matrix.system }}."${{ matrix.anchor-version }}".anchor-cli' -L

      - name: Build solana-rust
        run: nix build '.#legacyPackages.${{ matrix.system }}."${{ matrix.anchor-version }}".solana-rust' -L

  build:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        anchor-version: ["0.32.1", "1.0.0"]
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
          - runner: macos-latest
            system: aarch64-darwin
          - anchor-version: "1.0.0"
            build-flags: "--ignore-keys"

    runs-on: ${{ matrix.runner }}
    name: build (${{ matrix.system }}, ${{ matrix.anchor-version }})

    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build test program via overlay
        run: nix build ./test-apps/${{ matrix.anchor-version }}#default -L

      - name: Build test program via devshell
        run: nix develop ./test-apps/${{ matrix.anchor-version }} -c sh -c 'cd test-apps/${{ matrix.anchor-version }} && anchor build ${{ matrix.build-flags }}'

  e2e:
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        anchor-version: ["0.32.1", "1.0.0"]
        arch:
          - runner: ubuntu-latest
            system: x86_64-linux
        include:
          - anchor-version: "1.0.0"
            build-flags: "--ignore-keys"

    runs-on: ${{ matrix.arch.runner }}
    name: e2e (${{ matrix.arch.system }}, ${{ matrix.anchor-version }})

    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build program via overlay
        run: |
          PROGRAM_SO_PATH=$(nix build ./test-apps/${{ matrix.anchor-version }}#my-program --print-out-paths --no-link)/my_program.so
          echo "PROGRAM_SO_PATH=$PROGRAM_SO_PATH" >> $GITHUB_ENV

      - name: Run e2e tests
        run: |
          nix develop ./test-apps/${{ matrix.anchor-version }} -c \
            cargo test --manifest-path test-apps/${{ matrix.anchor-version }}/Cargo.toml --package e2e-tests --lib -- --nocapture

  check-platform-tools-override:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
          - runner: macos-latest
            system: aarch64-darwin

    runs-on: ${{ matrix.runner }}
    name: check-pt-override (${{ matrix.system }})

    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build platform-tools v1.48
        run: nix build '.#legacyPackages.${{ matrix.system }}."0.32.1".withPlatformTools."v1.48".solana-rust' -L

      - name: Build platform-tools v1.54
        run: nix build '.#legacyPackages.${{ matrix.system }}."0.32.1".withPlatformTools."v1.54".solana-rust' -L
